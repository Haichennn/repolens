name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (py_compile)
        working-directory: backend
        run: find . -name "*.py" -not -path "./venv/*" -exec python -m py_compile {} +

      - name: Schema imports
        working-directory: backend
        run: |
          python -c "from agent.schemas import RepoAuditReport, DocumentationAudit, ArchitectureAudit, MaintenanceAudit, TestingAudit, SecurityAudit; print('schemas OK')"

      - name: Graph + API import smoke test
        working-directory: backend
        run: |
          python -c "from agent.graph import audit_repo_streaming; from api.main import app; print('imports OK')"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
